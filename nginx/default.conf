# Map to conditionally set Connection header for WebSocket upgrades
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream api_upstream {
    server api:8000;
}

upstream frontend_upstream {
    server frontend:5173;
}

upstream ssh_proxy_upstream {
    server ssh-proxy:2222;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 50M;

    # ── Security headers ───────────────────────────────────────
    add_header X-Content-Type-Options    "nosniff"                        always;
    add_header X-Frame-Options           "SAMEORIGIN"                     always;
    add_header X-XSS-Protection          "1; mode=block"                  always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' ws: wss:; font-src 'self'; frame-ancestors 'self';"
        always;

    # ── API ────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://api_upstream/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # WebSocket support (noVNC) + SSE
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
    }

    # ── SSH WebSocket Proxy (xterm.js) ────────────────────────
    location /ws/ssh/ {
        proxy_pass         http://ssh_proxy_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Frontend (Vite dev server with HMR WebSocket) ──────────
    location / {
        proxy_pass         http://frontend_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }
}
